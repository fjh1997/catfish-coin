<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Catfish Coin</title>
  <desc id="desc">Minimal teal catfish and gold coin mark for the Catfish Coin privacy cryptocurrency.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="430" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FCFD"/>
      <stop offset="1" stop-color="#D5EEF3"/>
    </linearGradient>
    <radialGradient id="coinGlow" cx="256" cy="250" r="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE7A0"/>
      <stop offset="0.7" stop-color="#E8B23C"/>
      <stop offset="1" stop-color="#B87412"/>
    </radialGradient>
    <linearGradient id="fishBody" x1="90" y1="210" x2="430" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6AD5E4"/>
      <stop offset="0.5" stop-color="#1E93AC"/>
      <stop offset="1" stop-color="#0D5F73"/>
    </linearGradient>
    <linearGradient id="fishAccent" x1="340" y1="150" x2="460" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8BE0EC"/>
      <stop offset="1" stop-color="#147A94"/>
    </linearGradient>
    <filter id="lift" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0B3542" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Coin sits as the brand core -->
  <g filter="url(#lift)">
    <circle cx="256" cy="258" r="146" fill="url(#coinGlow)"/>
    <circle cx="256" cy="258" r="146" fill="none" stroke="#8F5A0E" stroke-width="7" opacity="0.55"/>
    <circle cx="256" cy="258" r="118" fill="none" stroke="#FFF4C8" stroke-width="10" opacity="0.75"/>
    <circle cx="256" cy="258" r="98" fill="none" stroke="#C88918" stroke-width="2.5" opacity="0.45"/>
    <!-- privacy lock motif -->
    <path d="M224 258a32 32 0 0 1 64 0" fill="none" stroke="#8F5A0E" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
    <path d="M288 258a32 32 0 0 1-64 0" fill="none" stroke="#8F5A0E" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
    <circle cx="256" cy="258" r="8" fill="#8F5A0E" opacity="0.55"/>
  </g>

  <!-- Sleeker catfish wrapping the lower-left of the coin -->
  <g filter="url(#lift)">
    <path d="M78 268c18-86 126-132 228-96 52 18 92 54 112 98-40-18-86-18-130 2 12 22 22 48 26 76-48-28-104-34-158-12-58 24-94-4-78-68z" fill="url(#fishBody)"/>
    <path d="M78 268c18-86 126-132 228-96 52 18 92 54 112 98-40-18-86-18-130 2 12 22 22 48 26 76-48-28-104-34-158-12-58 24-94-4-78-68z" fill="none" stroke="#0A4F67" stroke-width="6" stroke-linejoin="round" opacity="0.85"/>

    <path d="M372 176c34-40 90-50 130-28-20 26-52 44-96 52z" fill="url(#fishAccent)" stroke="#0A4F67" stroke-width="6" stroke-linejoin="round"/>
    <path d="M236 156c-4-26 10-54 34-78-2 30-10 56-24 82z" fill="#57C8D8" stroke="#0A4F67" stroke-width="5.5" stroke-linejoin="round"/>
    <path d="M142 292c-14 34-30 60-52 82 32-6 58-24 78-54z" fill="#148BA3" stroke="#0A4F67" stroke-width="5.5" stroke-linejoin="round"/>

    <!-- whiskers: distinctive but restrained -->
    <path d="M136 250c-32 6-58 24-78 48" fill="none" stroke="#0A4F67" stroke-width="5" stroke-linecap="round"/>
    <path d="M144 266c-34 16-62 36-82 62" fill="none" stroke="#0A4F67" stroke-width="5" stroke-linecap="round"/>
    <path d="M206 292c38 14 78 28 118 38" fill="none" stroke="#083B50" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

    <circle cx="168" cy="214" r="14" fill="#FFFFFF" stroke="#0A4F67" stroke-width="5"/>
    <circle cx="172" cy="215" r="5.5" fill="#12323D"/>
    <path d="M142 242c22 10 52 10 78-2" fill="none" stroke="#083B50" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
